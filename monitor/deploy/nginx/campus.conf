map $http_upgrade $connection_upgrade {
    default upgrade;
    '' close;
}

server {
    listen 80;
    server_name campus.example.com;

    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    server_name campus.example.com;

    # bootstrap.sh creates this temporary certificate so nginx can start before certbot.
    # After DNS is ready, run: certbot --nginx -d campus.example.com
    ssl_certificate /etc/ssl/certs/campus-selfsigned.crt;
    ssl_certificate_key /etc/ssl/private/campus-selfsigned.key;

    auth_basic "Campus services";
    auth_basic_user_file /etc/nginx/.htpasswd-campus;

    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    location = /monitor {
        return 301 /monitor/;
    }

    location /monitor/ {
        proxy_set_header X-Forwarded-Prefix /monitor;
        proxy_pass http://127.0.0.1:8011/;
    }

    location = /schedule {
        return 301 /schedule/;
    }

    location /schedule/ {
        proxy_set_header X-Forwarded-Prefix /schedule;
        proxy_pass http://127.0.0.1:8000/;
    }

    location = /n8n {
        return 301 /n8n/;
    }

    location /n8n/ {
        proxy_set_header X-Forwarded-Prefix /n8n;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_pass http://127.0.0.1:5678/;
    }
}
